name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

permissions:
  contents: read

jobs:
  go-compatibility:
    name: Go 1.22 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.22.4'
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.4'
          cache: true

      - name: Release preflight
        run: make release-preflight GO=go VERSION=ci

  docker:
    name: Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Build image
        run: |
          docker build --pull \
            --build-arg VERSION=ci \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg BUILD_DATE=1970-01-01T00:00:00Z \
            -t aegis:ci .

      - name: Inspect image
        run: |
          docker image inspect aegis:ci \
            --format 'image={{.Id}} os={{.Os}} arch={{.Architecture}} user={{.Config.User}} entrypoint={{json .Config.Entrypoint}} cmd={{json .Config.Cmd}}'
          test "$(docker image inspect aegis:ci --format '{{.Os}}')" = "linux"
          test "$(docker image inspect aegis:ci --format '{{.Config.User}}')" = "nonroot:nonroot"
          test "$(docker image inspect aegis:ci --format '{{json .Config.Entrypoint}}')" = '["/aegis"]'
          test "$(docker image inspect aegis:ci --format '{{json .Config.Cmd}}')" = '["--config","/etc/aegis/aegis.json"]'

      - name: Run read-only smoke
        run: |
          set -euo pipefail
          docker volume create aegis-ci-data >/dev/null
          cleanup() {
            docker rm -f aegis-ci >/dev/null 2>&1 || true
            docker volume rm aegis-ci-data >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name aegis-ci --read-only \
            -p 127.0.0.1:18082:8080 \
            -e AEGIS_MASTER_KEY="$(openssl rand -hex 32)" \
            -e AEGIS_JWT_KEY="$(openssl rand -hex 32)" \
            -v aegis-ci-data:/var/lib/aegis \
            aegis:ci >/dev/null
          health=''
          for _ in $(seq 1 30); do
            if health=$(curl -fsS http://127.0.0.1:18082/health); then
              break
            fi
            sleep 1
          done
          test "$health" = '{"status":"ok"}'
          printf 'health=%s\n' "$health"
          test "$(curl -sS -o /tmp/aegis-ci-unauth -w '%{http_code}' http://127.0.0.1:18082/v1/chat/completions)" = "401"
          docker inspect aegis-ci --format 'readonly={{.HostConfig.ReadonlyRootfs}} user={{.Config.User}}'
          test "$(docker inspect aegis-ci --format '{{.HostConfig.ReadonlyRootfs}}')" = "true"
          test "$(docker inspect aegis-ci --format '{{.Config.User}}')" = "nonroot:nonroot"
